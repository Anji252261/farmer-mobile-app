<ng-container *ngIf="!isLoginRoute; else authLayout">
  <ng-container *ngIf="currentUser$ | async as user">
    <app-header [darkMode]="darkMode" (menuToggle)="toggleSidebar()" (themeToggle)="toggleTheme()"></app-header>
    <div class="app-container">
      <app-sidebar [class.open]="showSidebar" (closed)="showSidebar=false"></app-sidebar>
      <div class="sidebar-backdrop" *ngIf="showSidebar" (click)="showSidebar=false"></div>
      <main class="main-content" [class.with-mobile-tabs]="user.role === 'SUB_OWNER'">
        <router-outlet></router-outlet>
      </main>
    </div>

    <nav class="mobile-tabbar" *ngIf="user.role === 'SUB_OWNER'" aria-label="Sub owner quick navigation">
      <a routerLink="/sub-owner/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
      <a routerLink="/sub-owner/customers" routerLinkActive="active">Customers</a>
      <a routerLink="/sub-owner/items" routerLinkActive="active">Items</a>
      <a routerLink="/sub-owner/sales/new" routerLinkActive="active">Sales</a>
    </nav>
  </ng-container>
</ng-container>

<ng-template #authLayout>
  <main class="auth-main">
    <router-outlet></router-outlet>
  </main>
</ng-template>
<app-toast></app-toast>
