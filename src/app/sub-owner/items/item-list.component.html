<div class="page-content">
  <ng-container *ngIf="showWarehouseDetails; else itemListView">
    <div class="warehouse-details-panel">
      <app-warehouse-details
        [item]="selectedItemForWarehouse"
        (close)="closeWarehouseDetails()"
      ></app-warehouse-details>
    </div>
  </ng-container>

  <ng-template #itemListView>
    <div class="list-header">
      <div class="header-top">
        <h1>Universal Items</h1>
        <button class="btn add" (click)="add()">
          <svg class="plus-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M8 3.5v9M3.5 8h9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Add Item</span>
        </button>
      </div>

      <div class="search-area">
        <div class="search-wrapper">
          <input type="text" placeholder="Search items..." [(ngModel)]="filter" (ngModelChange)="filter$.next($event)" />
          <button type="button" class="voice" (click)="startVoice('search')" [class.listening]="listening">
            <svg class="voice-icon" width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 1a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm5 10a5 5 0 0 1-10 0H5a7 7 0 0 0 14 0h-2zm-5 9v-4m0 4h4m-4 0H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="search-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M11.742 10.344l3.387 3.386-.708.708-3.386-3.387a6.5 6.5 0 1 1 .707-.707zm-5.242 1.156a5 5 0 1 0 0-10 5 5 0 0 0 0 10z"/>
            </svg>
          </span>
        </div>
        <hr class="divider" />
      </div>
    </div>

    <div class="items-grid">
      <div class="item-card" *ngFor="let it of filteredItems$ | async">
        <div class="card-img">
          <ng-container *ngIf="it.image; else placeholder">
            <img [src]="it.image" alt="{{ it.name }}" />
          </ng-container>
          <ng-template #placeholder>
            <div class="img-placeholder">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14l4-4 4 4 4-4 4 4 4-4z"/>
              </svg>
            </div>
          </ng-template>
        </div>

        <div class="card-body">
          <h4>{{ it.name }}</h4>
          <p class="qty">Qty: {{ it.quantity || 0 }} <span class="unit-pill">{{ it.unit }}</span></p>
          <p><span class="price-pill">₹{{ it.price }}/{{ it.unit }}</span></p>
          <p class="warehouse-info" *ngIf="(it.quantity || 0) > 0">
            <span class="available-badge">✓ In Stock</span>
            <button class="warehouse-link" (click)="showWarehouseInfo(it)">
              Available Quantity: {{ it.quantity || 0 }} {{ it.unit }}
            </button>
          </p>
          <p class="warehouse-info" *ngIf="(it.quantity || 0) <= 0">
            <span class="unavailable-badge">✗ Out of Stock</span>
          </p>
        </div>

        <div class="card-actions">
          <div class="left-actions">
            <button class="buy-plain" (click)="buyMore(it)">Buy More</button>
            <button class="edit-plain" (click)="edit(it)">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M12.146.854a.5.5 0 0 1 .708 0l2.292 2.292a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-4 1.5a.5.5 0 0 1-.65-.65l1.5-4a.5.5 0 0 1 .11-.168l10-10zM11.207 3L13 4.793 12.793 5 11 3.207 11.207 3zM10 4.207L2 12.207V14h1.793l8-8L10 4.207z"/>
              </svg>
              <span>Edit</span>
            </button>
          </div>
          <button class="delete-icon" (click)="delete(it)">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M5.5 5.5a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0v-6a.5.5 0 0 1 .5-.5zm2.5.5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0v-6zm2.5-.5a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0v-6a.5.5 0 0 1 .5-.5z"/>
              <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1 0-2H6l.5-1h3l.5 1h3a1 1 0 0 1 1 1zM4.118 4L4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </ng-template>
</div>

<app-item-modal
  *ngIf="showModal"
  [item]="currentItem"
  [showAvailabilityFields]="showAvailabilityFieldsInForm"
  (save)="save($event)"
  (closeModal)="closeModal()"
  (viewWarehouseDetails)="showWarehouseInfo($event)"
></app-item-modal>
